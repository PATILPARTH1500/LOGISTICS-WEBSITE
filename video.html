<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Intro</title>
  <style>
    /* Make the video fill the screen */
    #myVideo {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%; 
      min-height: 100%;
    }
    
    /* Full-page overlay to prompt user interaction */
    #overlay {
      position: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Video Element -->
  <video id="myVideo" autoplay muted>
    <source src="./assets/images/hero.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Overlay with interaction prompt -->
  <div id="overlay">
    Click to Play with Sound
  </div>

  <script>
    // Get the video and overlay elements
    var video = document.getElementById('myVideo');
    var overlay = document.getElementById('overlay');
    
    // Unmute and remove the overlay on user interaction
    overlay.addEventListener('click', function() {
      video.muted = false;  // Unmute the video
      overlay.style.display = 'none';  // Hide the overlay
    });
  </script>
</body>
</html>
